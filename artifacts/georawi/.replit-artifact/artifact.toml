kind = "web"
previewPath = "/"
title = "GeoRawi"
version = "1.0.0"
id = "artifacts/georawi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21219

[services.development]
run = "pnpm --filter @workspace/georawi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/georawi", "run", "build" ]
publicDir = "artifacts/georawi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21219"
BASE_PATH = "/"
